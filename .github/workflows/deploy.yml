name: Deploy till GitHub Pages

on:
  push:
    branches: [master, agent/stockholm-parking-data-pwa]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Hämta källkod
        uses: actions/checkout@v4

      - name: Konfigurera Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installera beroenden
        run: npm ci

      - name: Bygg appen
        run: npm run build
        env:
          VITE_BASE_URL: /ParkeraiSthlm/

      - name: Konfigurera GitHub Pages
        uses: actions/configure-pages@v5

      - name: Ladda upp build-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploya till GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
